<!DOCTYPE html>
<html lang="de">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<title>Stadthonig | Senior UX Edition</title>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
	<style>
		:root {
			--bg: #080809;
			--card: rgba(22, 22, 26, 0.88);
			--accent: #facc15;
			--text: #f5f5f7;
			--muted: #8e8e93;
			--stroke: rgba(255, 255, 255, 0.08);
			--glass: blur(25px);
			--sha: 0 20px 40px rgba(0,0,0,0.4);
		}
		body.light {
			--bg: #f5f5f7;
			--card: rgba(255, 255, 255, 0.7);
			--text: #1d1d1f;
			--muted: #86868b;
			--stroke: rgba(0, 0, 0, 0.08);
		}

		* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
		
		body {
			font-family: 'Inter', sans-serif;
			background: var(--bg);
			color: var(--text);
			margin: 0;
			overflow-x: hidden;
			transition: background 0.4s ease;
		}

		body.rtl { direction: rtl; text-align: right; }

		nav {
			position: fixed; top: 0; left: 0; right: 0; z-index: 2000;
			padding: env(safe-area-inset-top) 20px 15px;
			background: var(--card); backdrop-filter: var(--glass);
			-webkit-backdrop-filter: var(--glass);
			border-bottom: 1px solid var(--stroke);
		}

		.nav-top { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
		.logo { font-weight: 900; color: var(--accent); font-size: 1.3rem; cursor: pointer; }
		
		#themeToggle {
			background: var(--stroke); border: 1px solid var(--stroke);
			padding: 8px 14px; border-radius: 99px; color: var(--text);
			font-size: 0.7rem; font-weight: 800; cursor: pointer;
			display: flex; align-items: center; gap: 8px;
		}

		.lang-strip {
			display: flex; gap: 8px; overflow-x: auto;
			scrollbar-width: none; padding: 10px 0;
		}
		.lang-strip::-webkit-scrollbar { display: none; }
		.l-chip {
			padding: 8px 16px; border-radius: 12px; background: var(--stroke);
			font-size: 0.75rem; font-weight: 800; color: var(--muted);
			border: none; cursor: pointer; flex-shrink: 0;
		}
		.l-chip.active { background: var(--accent); color: #000; }

		.search-bar {
			width: 100%; padding: 14px 18px; border-radius: 16px;
			background: var(--stroke); border: none; color: var(--text);
			font-weight: 600; font-size: 0.95rem; margin-top: 5px;
		}

		.cat-scroll {
			display: flex; gap: 10px; overflow-x: auto;
			padding: 15px 20px; position: fixed; top: 175px; left: 0; right: 0;
			z-index: 1900; background: var(--bg); scrollbar-width: none;
		}
		.cat-chip {
			padding: 8px 18px; border-radius: 99px; background: var(--stroke);
			font-size: 0.8rem; font-weight: 700; white-space: nowrap;
			cursor: pointer; color: var(--muted);
		}
		.cat-chip.active { background: var(--text); color: var(--bg); }

		main { padding: 240px 20px 140px; max-width: 700px; margin: 0 auto; }

		.product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
		.product-card {
			background: var(--card); border: 1px solid var(--stroke);
			border-radius: 28px; overflow: hidden; cursor: pointer;
			transition: transform 0.2s;
		}
		.product-card img { width: 100%; height: 140px; object-fit: cover; }
		.card-info { padding: 15px; }
		.card-name { font-size: 0.9rem; font-weight: 800; margin-bottom: 5px; }
		.card-price { color: var(--accent); font-weight: 900; }

		.swipe-container { height: 320px; position: relative; margin-top: 20px; }
		.fact-card {
			position: absolute; inset: 0; background: var(--card); border: 1px solid var(--accent);
			border-radius: 35px; padding: 30px; display: flex; align-items: center;
			justify-content: center; text-align: center; font-size: 1.3rem; font-weight: 800;
			box-shadow: var(--sha); touch-action: none; transition: 0.4s ease;
		}
		.zoom-out-shading { transform: scale(0.6) rotate(-15deg); opacity: 0; }
		.zoom-in-shading { transform: scale(1.4) rotate(15deg); opacity: 0; }

		.action-btns { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
		.btn-action {
			width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--stroke);
			background: var(--card); color: var(--text); font-weight: 800;
			display: flex; align-items: center; justify-content: center; cursor: pointer;
		}

		.drawer {
			position: fixed; bottom: 0; left: 0; width: 100%;
			background: var(--card); border-radius: 30px 30px 0 0;
			transform: translateY(100%); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
			z-index: 3100; padding: 30px 25px;
		}
		.drawer.active { transform: translateY(0); }
		.drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3000; display: none; }

		.tabs {
			position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
			width: 85%; max-width: 380px; background: var(--card);
			border: 1px solid var(--stroke); border-radius: 40px;
			display: flex; justify-content: space-around; padding: 12px; z-index: 2500;
		}
		.tab-item { opacity: 0.4; text-align: center; font-size: 0.7rem; font-weight: 800; cursor: pointer; }
		.tab-item.active { opacity: 1; color: var(--accent); }
	</style>
</head>
<body>

	<div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>

	<nav>
		<div class="nav-top">

		<input type="text" id="searchInput" class="search-bar" oninput="state.search=this.value; renderProducts();">
	</nav>

	<div class="cat-scroll" id="catScroll"></div>

			</div>
			<div class="swipe-container" id="swipeContainer"></div>
			<div class="action-btns">

			</div>
		</section>
	</main>

	<div class="drawer" id="orderDrawer">
		<h2 id="dTitle" style="margin:0 0 20px 0;">Bestellung</h2>
		<div id="selectedItem" style="padding:15px; background:var(--stroke); border-radius:20px;"></div>
		<div style="display:flex; justify-content:space-between; align-items:center; margin:25px 0; font-weight:900; font-size:1.4rem;">
			<span data-i18n="total">Total</span>
			<span id="finalTotal" style="color:var(--accent)">€0.00</span>
		</div>
		<button style="width:100%; padding:18px; border-radius:18px; background:var(--accent); border:none; font-weight:900;" onclick="finishToWhatsApp()">Confirm WhatsApp</button>
	</div>

	<div class="tabs">
		<div class="tab-item active" onclick="setTab('shop')" id="tab-shop">

				ar: { n_shop: "متجر", n_facts: "أسرار", total: "المجموع", search: "بحث..." },

		let state = {
			lang: localStorage.getItem('sh_lang') || 'de',
			tab: 'shop',
			cat: 'All',
			search: '',
			cart: null,
			fIdx: 0,
			animating: false
		};

		function renderAll() {
			document.body.classList.toggle('rtl', state.lang === 'ar');
			
			// Render Languages
			document.getElementById('langStrip').innerHTML = DB.langs.map(l => `
				<button class="l-chip ${state.lang === l ? 'active' : ''}" onclick="setLang('${l}')">${l.toUpperCase()}</button>
			`).join('');

			// Render Categories
			const cats = DB.categories[state.lang] || DB.categories.en;
			document.getElementById('catScroll').innerHTML = cats.map((c, i) => `
				<div class="cat-chip ${state.cat === DB.categories.en[i] ? 'active' : ''}" onclick="setCat('${DB.categories.en[i]}')">${c}</div>
			`).join('');

			// Render UI Translations
			const t = DB.ui[state.lang] || DB.ui.en;
			document.getElementById('searchInput').placeholder = t.search;
			document.querySelectorAll('[data-i18n]').forEach(el => {
				const key = el.getAttribute('data-i18n');
				el.innerText = t[key] || key;
			});

			renderProducts();
			if(state.tab === 'facts') renderFacts();
		}

		function renderProducts() {
			const grid = document.getElementById('productGrid');
			const filtered = DB.products.filter(p => {
				const name = p.name[state.lang] || p.name.en;
				return (state.cat === 'All' || p.cat === state.cat) && name.toLowerCase().includes(state.search.toLowerCase());
			});
			grid.innerHTML = filtered.map(p => `
				<div class="product-card" onclick="openOrder(${p.id})">
					<img src="${p.img}">
					<div class="card-info">
						<div class="card-name">${p.name[state.lang] || p.name.en}</div>
						<div class="card-price">€${p.price.toFixed(2)}</div>
					</div>
				</div>
			`).join('');
		}

		function renderFacts() {
			const list = DB.facts[state.lang] || DB.facts.en;
			const container = document.getElementById('swipeContainer');
			container.innerHTML = `<div class="fact-card" id="qCard">${list[state.fIdx % list.length]}</div>`;
		}

		function setLang(l) {
			state.lang = l;
			state.fIdx = 0;
			localStorage.setItem('sh_lang', l);
			renderAll();
		}

		function setTab(t) {
			state.tab = t;
			document.getElementById('view-shop').style.display = t === 'shop' ? 'block' : 'none';
			document.getElementById('view-facts').style.display = t === 'facts' ? 'block' : 'none';
			document.getElementById('catScroll').style.display = t === 'shop' ? 'flex' : 'none';
			document.getElementById('tab-shop').classList.toggle('active', t === 'shop');
			document.getElementById('tab-facts').classList.toggle('active', t === 'facts');
			renderAll();
		}

		function reactFact(type) {
			if(state.animating) return;
			state.animating = true;
			const card = document.getElementById('qCard');
			card.classList.add(type === 'ok' ? 'zoom-out-shading' : 'zoom-in-shading');
			setTimeout(() => {
				state.fIdx++;
				state.animating = false;
				renderFacts();
			}, 400);
		}

		function openOrder(id) {
			const p = DB.products.find(x => x.id === id);
			state.cart = p;
			document.getElementById('selectedItem').innerHTML = `<b>${p.name[state.lang] || p.name.en}</b><br>Standard Edition`;
			document.getElementById('finalTotal').innerText = `€${p.price.toFixed(2)}`;
			document.getElementById('orderDrawer').classList.add('active');
			document.getElementById('overlay').style.display = 'block';
		}

		function closeDrawer() {
			document.getElementById('orderDrawer').classList.remove('active');
			document.getElementById('overlay').style.display = 'none';
		}

		function finishToWhatsApp() {
			const msg = `Order: ${(state.cart && (state.cart.name[state.lang] || state.cart.name.en)) || ''} - €${(state.cart && state.cart.price ? state.cart.price.toFixed(2) : '0.00')}`;
			window.open(`https://wa.me/436601234567?text=${encodeURIComponent(msg)}`);
		}

		function toggleTheme() {
			const body = document.body;
			body.classList.toggle('light');
			const isLight = body.classList.contains('light');
			document.getElementById('themeIcon').innerText = isLight ? '🐝' : '🌙';
			document.getElementById('themeText').innerText = isLight ? 'BEEZ MODE' : 'ZZZ MODE';
		}

		function setCat(c) { state.cat = c; renderAll(); }
		function resetApp() { state.search = ''; state.cat = 'All'; renderAll(); }

		window.onload = renderAll;
	</script>
