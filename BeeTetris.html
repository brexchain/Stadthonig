<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Premium Bee Tetris – Queen Maja Edition</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="theme-color" content="#020617">
  <style>
    body{
      margin:0;
      padding:0;
      background:radial-gradient(circle at top,#1e293b,#020617 55%);
      color:#f9fafb;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:100vh;
    }
    h1{
      margin:10px 0 2px;
      font-size:1.4rem;
      letter-spacing:.08em;
    }
    h1 span{
      color:#facc15;
    }
    #subtitle{
      font-size:.8rem;
      opacity:.8;
      margin-bottom:10px;
      text-align:center;
    }
    #game-wrapper{
      background:rgba(15,23,42,0.96);
      padding:14px;
      border-radius:18px;
      box-shadow:0 30px 80px rgba(0,0,0,.8);
      display:flex;
      gap:16px;
      border:1px solid rgba(148,163,184,0.35);
      max-width:680px;
      width:100%;
    }
    canvas{
      background:#020617;
      border-radius:10px;
      flex-shrink:0;
    }
    #side{
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      font-size:.85rem;
      width:100%;
      max-width:220px;
    }
    #info ul{
      padding-left:18px;
      margin:4px 0 8px;
    }
    .label{
      font-size:.8rem;
      opacity:.8;
    }
    .score{
      margin-top:6px;
      font-weight:700;
      font-size:.9rem;
    }
    button{
      border:none;
      cursor:pointer;
    }
    #restart-btn{
      margin-top:8px;
      padding:7px 12px;
      border-radius:999px;
      font-weight:600;
      background:linear-gradient(135deg,#22c55e,#4ade80);
      color:#022c22;
      box-shadow:0 8px 18px rgba(34,197,94,.45);
      font-size:.85rem;
    }
    #restart-btn:hover{
      filter:brightness(1.05);
      transform:translateY(-1px);
    }
    #mobile-controls{
      margin-top:10px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
    }
    #mobile-controls button{
      padding:6px 10px;
      border-radius:10px;
      background:#0f172a;
      color:#e5e7eb;
      font-size:.9rem;
      border:1px solid rgba(148,163,184,0.6);
    }
    #mobile-controls button:active{
      background:#1f2937;
    }
    #mobile-arrow-row{
      display:flex;
      gap:6px;
    }
    #highscores{
      font-size:.8rem;
      padding-left:18px;
      margin:4px 0 0;
      max-height:150px;
      overflow:auto;
    }
    @media(max-width:720px){
      #game-wrapper{
        flex-direction:column;
        align-items:center;
      }
      #side{
        max-width:none;
        width:100%;
      }
    }
  </style>
</head>
<body>
  <h1><span>🐝</span> Premium Bee‑Tetris</h1>
  <div id="subtitle">Queen Maja Highscore, IKEA‑Bee‑Blocks, Mobile‑Controls & gespeicherte Scores</div>

  <div id="game-wrapper">
    <canvas id="board" width="200" height="400"></canvas>

    <div id="side">
      <div id="info">
        <div class="label">Steuerung (Desktop):</div>
        <ul>
          <li>← → : bewegen</li>
          <li>↓ : schneller fallen</li>
          <li>↑ : rotieren</li>
          <li>Leertaste: Hard Drop</li>
        </ul>

        <div id="mobile-controls">
          <div class="label">Mobile Steuerung:</div>
          <div>
            <button onclick="controlRotate()">⤾ drehen</button>
          </div>
          <div id="mobile-arrow-row">
            <button onclick="controlLeft()">◀</button>
            <button onclick="controlDown()">▼</button>
            <button onclick="controlRight()">▶</button>
          </div>
          <button onclick="controlDrop()">HARD DROP</button>
        </div>

        <div class="label" style="margin-top:10px;">Highscores (lokal gespeichert):</div>
        <ol id="highscores"></ol>
      </div>

      <div>
        <div class="score">Score: <span id="score">0</span></div>
        <button id="restart-btn" onclick="restart()">🔁 Restart</button>
      </div>
    </div>
  </div>

  <script>
    // --- Grundparameter ---
    const COLS = 10;
    const ROWS = 20;
    const BLOCK = 20;

    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    let grid, current, nextDrop, score, gameOver, dropInterval;

    // Tetromino-Formen
    const SHAPES = [
      [[1,1,1,1]],               // I
      [[1,1],[1,1]],             // O (Queen)
      [[0,1,0],[1,1,1]],         // T
      [[1,0,0],[1,1,1]],         // J
      [[0,0,1],[1,1,1]],         // L
      [[1,1,0],[0,1,1]],         // S
      [[0,1,1],[1,1,0]]          // Z
    ];

    // Icon-Labels (statt Emoji, aber du kannst sie als SVG-Name verstehen)
    const iconLabelMap = {
      1: 'I',   // Regal/Brett
      2: 'Q',   // Queen
      3: 'T',   // Chair
      4: 'J',   // Box
      5: 'L',   // Toolbox
      6: 'S',   // Bricks
      7: 'Z'    // Books
    };

    // --- Highscore / Storage ---
    const HS_KEY = 'beeTetrisHighscores';

    function getHighscores(){
      const raw = localStorage.getItem(HS_KEY);
      if(!raw) return [];
      try{ return JSON.parse(raw); }catch{ return []; }
    }

    function saveScore(score){
      const list = getHighscores();
      let name = prompt('Dein Bee‑Name? (für Highscore)', 'Worker Bee');
      if(!name) return;
      name = name.trim();
      if(!name) name = 'Worker Bee';
      list.push({name, score});
      list.sort((a,b)=>b.score-a.score);
      localStorage.setItem(HS_KEY, JSON.stringify(list.slice(0,20)));
    }

    function renderHighscores(){
      const list = getHighscores();
      const avg = list.length ? Math.round(list.reduce((s,e)=>s+e.score,0)/list.length) : 100;
      const queenScore = avg*100 || 10000;

      const funnyNames = [
        'Drone Donny',
        'Nektar Nelly',
        'Buzz Karl',
        'Pollen Paul',
        'Waben Willi',
        'Fluglotse Fibi'
      ];
      const funnyEntries = funnyNames.map((n,i)=>({
        name:n,
        score:Math.max(50,Math.floor(queenScore/(6+i)))
      }));

      const base = [{name:'Queen Maja 👑', score:queenScore}, ...funnyEntries];

      const merged = [...base, ...list].sort((a,b)=>b.score-a.score).slice(0,10);

      const ul = document.getElementById('highscores');
      ul.innerHTML = merged.map((e,i)=>`<li>${i+1}. ${e.name} – ${e.score}</li>`).join('');
    }

    // --- Tetris Logik ---
    function newGrid(){
      const g = [];
      for(let r=0;r<ROWS;r++){
        g[r] = Array(COLS).fill(0);
      }
      return g;
    }

    function randomPiece(){
      const type = Math.floor(Math.random()*SHAPES.length);
      return {
        shape: SHAPES[type].map(row=>row.slice()),
        x: 3,
        y: 0,
        type
      };
    }

    function collide(grid,piece){
      const m = piece.shape;
      for(let y=0;y<m.length;y++){
        for(let x=0;x<m[y].length;x++){
          if(m[y][x]){
            const nx = piece.x + x;
            const ny = piece.y + y;
            if(nx<0 || nx>=COLS || ny>=ROWS || (ny>=0 && grid[ny][nx])) return true;
          }
        }
      }
      return false;
    }

    function merge(grid,piece){
      piece.shape.forEach((row,y)=>{
        row.forEach((val,x)=>{
          if(val && piece.y + y >= 0){
            grid[piece.y+y][piece.x+x] = piece.type+1;
          }
        });
      });
    }

    function rotate(shape){
      const N = shape.length;
      const res = [];
      for(let y=0;y<N;y++){
        res[y] = [];
        for(let x=0;x<N;x++){
          res[y][x] = shape[N-1-x][y] || 0;
        }
      }
      return res;
    }

    function clearLines(){
      let lines = 0;
      outer: for(let y=ROWS-1;y>=0;y--){
        for(let x=0;x<COLS;x++){
          if(!grid[y][x]) continue outer;
        }
        const row = grid.splice(y,1)[0].fill(0);
        grid.unshift(row);
        lines++;
        y++;
      }
      if(lines>0){
        score += lines*100;
        scoreEl.textContent = score;
      }
    }

    function roundRect(ctx, x, y, w, h, r){
      ctx.beginPath();
      ctx.moveTo(x+r, y);
      ctx.lineTo(x+w-r, y);
      ctx.quadraticCurveTo(x+w, y, x+w, y+r);
      ctx.lineTo(x+w, y+h-r);
      ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
      ctx.lineTo(x+r, y+h);
      ctx.quadraticCurveTo(x, y+h, x, y+h-r);
      ctx.lineTo(x, y+r);
      ctx.quadraticCurveTo(x, y, x+r, y);
      ctx.closePath();
    }

    function drawBlock(x, y, type){
      const px = x * BLOCK;
      const py = y * BLOCK;

      ctx.save();
      ctx.shadowColor = type === 2 ? 'rgba(234,179,8,0.9)' : 'rgba(59,130,246,0.8)';
      ctx.shadowBlur = 12;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;

      ctx.fillStyle = 'rgba(15,23,42,0.95)';
      roundRect(ctx, px+1, py+1, BLOCK-2, BLOCK-2, 4);
      ctx.fill();
      ctx.restore();

      ctx.lineWidth = 1.4;
      ctx.strokeStyle = type === 2 ? '#facc15' : '#38bdf8';
      roundRect(ctx, px+1.5, py+1.5, BLOCK-3, BLOCK-3, 4);
      ctx.stroke();

      ctx.font = 'bold 12px system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const label = iconLabelMap[type] || '?';
      ctx.fillStyle = '#e5e7eb';
      ctx.fillText(label, px + BLOCK/2, py + BLOCK/2);
    }

    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#020617';
      ctx.fillRect(0,0,canvas.width,canvas.height);

      for(let y=0;y<ROWS;y++){
        for(let x=0;x<COLS;x++){
          if(grid[y][x]){
            drawBlock(x,y,grid[y][x]);
          }
        }
      }
      if(current){
        current.shape.forEach((row,dy)=>{
          row.forEach((val,dx)=>{
            if(val){
              drawBlock(current.x+dx,current.y+dy,current.type+1);
            }
          });
        });
      }
      if(gameOver){
        ctx.fillStyle='rgba(0,0,0,0.6)';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle='#f9fafb';
        ctx.font='bold 18px system-ui';
        ctx.textAlign='center';
        ctx.fillText('Game Over',canvas.width/2,canvas.height/2);
        ctx.font='12px system-ui';
        ctx.fillText('🔁 Restart drücken',canvas.width/2,canvas.height/2+18);
      }
    }

    function drop(){
      if(gameOver) return;
      current.y++;
      if(collide(grid,current)){
        current.y--;
        merge(grid,current);
        clearLines();
        current = randomPiece();
        if(collide(grid,current)){
          gameOver = true;
          saveScore(score);
          renderHighscores();
        }
      }
      draw();
    }

    function loop(timestamp){
      if(gameOver) return;
      if(!nextDrop) nextDrop = timestamp;
      const dt = timestamp - nextDrop;
      if(dt>dropInterval){
        drop();
        nextDrop = timestamp;
      }
      requestAnimationFrame(loop);
    }

    function restart(){
      grid = newGrid();
      current = randomPiece();
      score = 0;
      scoreEl.textContent = score;
      gameOver = false;
      nextDrop = 0;
      dropInterval = 550;
      draw();
      requestAnimationFrame(loop);
    }

    // Gemeinsame Eingabe-Logik
    function handleInput(key){
      if(gameOver) return;
      if(key==='ArrowLeft'){
        current.x--;
        if(collide(grid,current)) current.x++;
      }else if(key==='ArrowRight'){
        current.x++;
        if(collide(grid,current)) current.x--;
      }else if(key==='ArrowDown'){
        current.y++;
        if(collide(grid,current)) current.y--;
      }else if(key==='ArrowUp'){
        const old = current.shape.map(r=>r.slice());
        const n = Math.max(current.shape.length,current.shape[0].length);
        const padded = Array.from({length:n},(_,y)=>Array.from({length:n},(_,x)=>current.shape[y]?.[x]||0));
        const rotated = rotate(padded);
        current.shape = rotated;
        if(collide(grid,current)) current.shape = old;
      }else if(key===' '){
        while(!collide(grid,current)){
          current.y++;
        }
        current.y--;
        merge(grid,current);
        clearLines();
        current = randomPiece();
        if(collide(grid,current)){
          gameOver = true;
          saveScore(score);
          renderHighscores();
        }
      }
      draw();
    }

    document.addEventListener('keydown',e=>{
      if(['ArrowLeft','ArrowRight','ArrowDown','ArrowUp',' '].includes(e.key)){
        e.preventDefault(); // Seite nicht scrollen[web:91]
        handleInput(e.key);
      }
    });

    // Mobile Controls -> gleiche Logik
    function controlLeft(){ handleInput('ArrowLeft'); }
    function controlRight(){ handleInput('ArrowRight'); }
    function controlDown(){ handleInput('ArrowDown'); }
    function controlRotate(){ handleInput('ArrowUp'); }
    function controlDrop(){ handleInput(' '); }

    // PWA ready: Service Worker Registrierung (du kannst später service-worker.js ergänzen)
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('service-worker.js').catch(()=>{});
    }

    // Start
    renderHighscores();
    restart();
  </script>
</body>
</html>
